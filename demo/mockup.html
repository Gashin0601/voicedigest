<!doctype html><html lang="en"><head><meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',system-ui,sans-serif}
  body{width:900px;height:640px;background:linear-gradient(135deg,#eef2ff,#f8fafc);
       display:flex;align-items:center;justify-content:center}
  .card{width:420px;background:#fff;border-radius:20px;padding:44px 40px;
        box-shadow:0 24px 60px rgba(30,41,59,.14)}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:28px}
  .logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#22c55e,#16a34a)}
  .brand span{font-weight:700;font-size:20px;color:#0f172a}
  h1{font-size:24px;color:#0f172a;margin-bottom:6px}
  p.sub{font-size:14px;color:#64748b;margin-bottom:26px}
  label{display:block;font-size:13px;font-weight:600;color:#334155;margin:14px 0 6px}
  input{width:100%;height:46px;border:1px solid #e2e8f0;border-radius:11px;
        padding:0 14px;font-size:15px;color:#0f172a;background:#f8fafc}
  .btn{width:100%;height:50px;margin-top:24px;border:none;border-radius:12px;
       background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;
       font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 8px 20px rgba(34,197,94,.35)}
  .foot{margin-top:18px;text-align:center;font-size:13px;color:#64748b}
  .foot a{color:#16a34a;font-weight:600;text-decoration:none}
</style></head>
<body>
  <div class="card">
    <div class="brand"><div class="logo"></div><span>Kiara</span></div>
    <h1>Create your account</h1>
    <p class="sub">Start your 14-day free trial. No card required.</p>
    <label>Work email</label>
    <input value="you@company.com">
    <label>Password</label>
    <input type="password" value="••••••••••">
    <button class="btn">Create account</button>
    <div class="foot">Already have an account? <a>Sign in</a></div>
  </div>
</body></html>
